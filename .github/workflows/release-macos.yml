# Build TTR Bot.app and attach a zip to GitHub Releases (tags) or as a CI artifact (manual).
name: Release (macOS app)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Prefer python.org build from setup-python (usually includes tkinter on macOS).
      # If not, fall back to Homebrew python-tk and pick whichever bin imports tkinter.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: arm64

      - name: Resolve Python with tkinter
        id: python
        run: |
          set -euo pipefail
          try_py() {
            local bin="$1"
            [ -x "$bin" ] || return 1
            if "$bin" -c "import tkinter" 2>/dev/null; then
              echo "$bin"
              return 0
            fi
            return 1
          }
          PY_EXE=""
          for cand in "$(command -v python3 || true)" "$(command -v python || true)"; do
            [ -n "$cand" ] || continue
            if PY_EXE="$(try_py "$cand")"; then
              break
            fi
          done
          if [ -z "${PY_EXE}" ]; then
            echo "setup-python build has no tkinter; installing Homebrew python-tk@3.13"
            brew install python-tk@3.13
            ROOT="$(brew --prefix python-tk@3.13)/bin"
            shopt -s nullglob
            for cand in "${ROOT}"/python3.* "${ROOT}/python3"; do
              if PY_EXE="$(try_py "$cand")"; then
                break
              fi
            done
            shopt -u nullglob
          fi
          if [ -z "${PY_EXE}" ]; then
            echo "::error::No Python with tkinter found"
            ls -la "$(brew --prefix python-tk@3.13)/bin" 2>/dev/null || true
            exit 1
          fi
          echo "Using Python: ${PY_EXE}"
          "${PY_EXE}" -c "import tkinter; print('tkinter OK')"
          echo "exe=${PY_EXE}" >> "${GITHUB_OUTPUT}"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps and build .app
        run: |
          uv sync --python "${{ steps.python.outputs.exe }}" --group dev --frozen
          uv run --python "${{ steps.python.outputs.exe }}" pyinstaller --noconfirm "TTR Bot.spec"

      # Optional: requires Apple Developer Program + repo secrets (see README).
      - name: Codesign application (Developer ID)
        if: ${{ secrets.MACOS_CODESIGN_P12 != '' }}
        env:
          MACOS_CODESIGN_P12: ${{ secrets.MACOS_CODESIGN_P12 }}
          MACOS_CODESIGN_P12_PASSWORD: ${{ secrets.MACOS_CODESIGN_P12_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: bash scripts/ci_codesign_mac_app.sh "dist/TTR Bot.app"

      - name: Notarize and staple
        if: ${{ secrets.MACOS_CODESIGN_P12 != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash scripts/ci_notarize_mac_app.sh "dist/TTR Bot.app"

      - name: Zip app bundle for distribution
        run: |
          cd dist
          ditto -c -k --keepParent "TTR Bot.app" "${GITHUB_WORKSPACE}/TTR-Bot-macos-arm64.zip"
          ls -la "${GITHUB_WORKSPACE}/TTR-Bot-macos-arm64.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTR-Bot-macos-arm64
          path: TTR-Bot-macos-arm64.zip

      - name: Publish GitHub Release asset
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TTR-Bot-macos-arm64.zip
          generate_release_notes: true
